<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bootcamp-todo-project</title>
  </head>
  <body>
    <div id="app" class="bg-stone-600 rounded-2xl px-16 py-4">
      <h1 class="text-stone-50">Todo List</h1>
      <form
        action=""
        class="shadow-sm bg-stone-100 appearance-none outline-none rounded-sm flex overflow-hidden"
      >
        <input
          type="text"
          id="todo-input"
          placeholder="할 일을 입력하세요!"
          class="flex-1 px-1"
        />
        <button type="submit" id="add-btn" class="bg-amber-600 p-1.5">
          추가
        </button>
      </form>
      <template>
        <ul>
          <li></li>
        </ul>
      </template>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
